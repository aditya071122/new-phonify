name: Testing

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: testing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: phonify_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d phonify_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: 0
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,testserver
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      POSTGRES_DB: phonify_ci
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_SSLMODE: disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Check migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run Django checks
        run: python manage.py check

      - name: Run backend smoke tests
        shell: bash
        run: |
          set -o pipefail
          python manage.py test --verbosity 2 | tee ../backend-test-report.txt

      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend-test-report.txt

  frontend-smoke:
    name: Frontend Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        shell: bash
        run: |
          set -o pipefail
          npm run build | tee frontend-build-report.txt

      - name: Upload frontend report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-report
          path: frontend-build-report.txt
